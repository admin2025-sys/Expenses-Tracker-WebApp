apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp-namespace
  labels:
    app: expense
spec:
  replicas: 5
  selector:
    matchLabels:
      app: expense
  template:
    metadata:
      labels:
        app: expense
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox
        command:
        - sh
        - -c
        - |
          until nc -z mysql 3306; do
            echo "Waiting for MySQL..."
            sleep 5
          done
      containers: 
      - name: webapp-container
        image: expense-wenapp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: webapp-config
              key: SPRING_DATASOURCE_USERNAME

        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: webapp-config
              key: SPRING_DATASOURCE_URL

        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: SPRING_DATASOURCE_PASSWORD
