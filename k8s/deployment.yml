apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp-namespace
  labels:
    app: expense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense
  template:
    metadata:
      labels:
        app: expense
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox
        command:
        - sh
        - -c
        - |
          until nc -z mysql 3306; do
            echo "Waiting for MySQL..."
            sleep 5
          done
      containers: 
      - name: webapp-container
        image: expense-wenapp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql:3306/expenses_tracker?allowPublicKeyRetrieval=true&useSSL=false"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "Test@123"
